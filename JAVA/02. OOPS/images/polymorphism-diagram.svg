<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Top: One Interface/Command -->
  <rect x="200" y="20" width="200" height="60" fill="#E8EAF6" stroke="#3F51B5" stroke-width="3" rx="10" />
  <text x="300" y="55" font-size="16" font-weight="bold" text-anchor="middle" fill="#1A237E">One Command: sound()</text>
  
  <!-- Main split paths -->
  <path d="M 300,80 L 150,140" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowhead-poly)" />
  <path d="M 300,80 L 300,140" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowhead-poly)" />
  <path d="M 300,80 L 450,140" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowhead-poly)" />

  <!-- Objects (Different Forms) -->
  <!-- Dog -->
  <rect x="80" y="140" width="140" height="120" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5" />
  <text x="150" y="170" font-size="14" font-weight="bold" text-anchor="middle" fill="#BF360C">Object: Dog</text>
  <path d="M 100,200 L 200,200" stroke="#E65100" stroke-width="1" />
  <text x="150" y="235" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">"Woof! Woof!"</text>

  <!-- Cat -->
  <rect x="230" y="140" width="140" height="120" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5" />
  <text x="300" y="170" font-size="14" font-weight="bold" text-anchor="middle" fill="#4A148C">Object: Cat</text>
  <path d="M 250,200 L 350,200" stroke="#7B1FA2" stroke-width="1" />
  <text x="300" y="235" font-size="16" font-weight="bold" text-anchor="middle" fill="#7B1FA2">"Meow!"</text>

  <!-- Cow -->
  <rect x="380" y="140" width="140" height="120" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5" />
  <text x="450" y="170" font-size="14" font-weight="bold" text-anchor="middle" fill="#1B5E20">Object: Cow</text>
  <path d="M 400,200 L 500,200" stroke="#2E7D32" stroke-width="1" />
  <text x="450" y="235" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">"Moo!"</text>

  <!-- Annotation -->
  <text x="300" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Same Action (sound) • Multiple Forms (Behaviors)</text>
  <text x="300" y="345" font-size="12" text-anchor="middle" fill="#666">(JVM decides which behavior to trigger based on the actual object)</text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead-poly" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3F51B5" />
    </marker>
  </defs>

  <!-- Footnote -->
  <rect x="50" y="365" width="500" height="30" fill="#FFFDE7" stroke="#FBC02D" stroke-width="1" rx="5" />
  <text x="300" y="385" font-size="12" text-anchor="middle" fill="#F57F17">"Many Forms" - Dynamic Method Dispatch at Runtime</text>
</svg>
