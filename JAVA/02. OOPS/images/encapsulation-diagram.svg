<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Outside World -->
  <rect x="20" y="20" width="120" height="310" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1" rx="10" />
  <text x="80" y="45" font-size="14" font-weight="bold" text-anchor="middle" fill="#616161">Outside World</text>
  <text x="80" y="150" font-size="12" text-anchor="middle" fill="#757575">(Users/Other Classes)</text>

  <!-- Capsule/Class -->
  <rect x="180" y="40" width="280" height="270" fill="#E3F2FD" stroke="#1976D2" stroke-width="3" rx="40" />
  <text x="320" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#0D47A1">Class: Student (Encapsulated)</text>

  <!-- Private Data (Inner Core) -->
  <rect x="230" y="130" width="180" height="130" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="10" />
  <text x="320" y="155" font-size="14" font-weight="bold" text-anchor="middle" fill="#0D47A1">Private Data</text>
  <text x="250" y="185" font-size="12" fill="#0D47A1">• name</text>
  <text x="250" y="205" font-size="12" fill="#0D47A1">• age</text>
  <text x="250" y="225" font-size="12" fill="#0D47A1">• gpa</text>
  <text x="320" y="250" font-size="10" font-style="italic" text-anchor="middle" fill="#0D47A1">(Direct Access Blocked ❌)</text>

  <!-- Public Methods (The Gates) -->
  <!-- Setter -->
  <rect x="160" y="70" width="100" height="40" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" rx="5" />
  <text x="210" y="95" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">setAge(20)</text>
  
  <!-- Getter -->
  <rect x="160" y="250" width="100" height="40" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="5" />
  <text x="210" y="275" font-size="11" font-weight="bold" text-anchor="middle" fill="#F57F17">getAge()</text>

  <!-- Arrows -->
  <path d="M 140,90 L 160,90" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowhead-green)" />
  <path d="M 260,90 Q 320,90 320,130" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)" />
  
  <path d="M 320,260 Q 320,270 260,270" stroke="#FBC02D" stroke-width="2" fill="none" marker-end="url(#arrowhead-yellow)" />
  <path d="M 160,270 L 140,270" stroke="#FBC02D" stroke-width="2" marker-end="url(#arrowhead-yellow)" />

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E7D32" />
    </marker>
    <marker id="arrowhead-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FBC02D" />
    </marker>
  </defs>

  <text x="320" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Data Hiding + Controlled Access</text>
</svg>
