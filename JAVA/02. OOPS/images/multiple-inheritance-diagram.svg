<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Interface 1: Pet -->
  <rect x="50" y="20" width="160" height="80" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,5" rx="5" />
  <text x="130" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D47A1">«interface»</text>
  <text x="130" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="#0D47A1">Pet</text>
  <text x="60" y="85" font-size="11" fill="#0D47A1">• play()</text>

  <!-- Interface 2: Mammal -->
  <rect x="290" y="20" width="160" height="80" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,5" rx="5" />
  <text x="370" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D47A1">«interface»</text>
  <text x="370" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="#0D47A1">Mammal</text>
  <text x="300" y="85" font-size="11" fill="#0D47A1">• giveBirth()</text>

  <!-- Lines -->
  <line x1="130" y1="100" x2="250" y2="180" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="370" y1="100" x2="250" y2="180" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Arrow heads -->
  <polygon points="250,180 240,165 260,165" fill="#1976D2" />
  
  <text x="140" y="150" font-size="11" fill="#1976D2" font-style="italic">implements</text>
  <text x="310" y="150" font-size="11" fill="#1976D2" font-style="italic">implements</text>

  <!-- Child: Dog -->
  <rect x="150" y="180" width="200" height="90" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5" />
  <text x="250" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#BF360C">Dog</text>
  <text x="160" y="235" font-size="11" fill="#BF360C">• Must implement: play()</text>
  <text x="160" y="255" font-size="11" fill="#BF360C">• Must implement: giveBirth()</text>

  <!-- Title -->
  <text x="250" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Multiple Inheritance (Interfaces)</text>
  <text x="250" y="330" font-size="12" text-anchor="middle" fill="#666">(Java allows multiple inheritance ONLY through interfaces)</text>
</svg>
