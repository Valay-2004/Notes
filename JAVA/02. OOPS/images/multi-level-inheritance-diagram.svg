<svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Top: LivingThing -->
  <rect x="100" y="20" width="200" height="80" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5" />
  <text x="200" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#4A148C">LivingThing (Base)</text>
  <text x="110" y="80" font-size="11" fill="#4A148C">• breathe()</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7B1FA2" />
    </marker>
  </defs>
  <line x1="200" y1="100" x2="200" y2="140" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="210" y="125" font-size="11" fill="#7B1FA2" font-style="italic">extends</text>

  <!-- Middle: Animal -->
  <rect x="100" y="140" width="200" height="90" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5" />
  <text x="200" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#1B5E20">Animal (Intermediate)</text>
  <text x="110" y="200" font-size="11" fill="#1B5E20">• Inherited: breathe()</text>
  <text x="110" y="220" font-size="11" fill="#1B5E20">• eat()</text>

  <!-- Arrow 2 -->
  <line x1="200" y1="230" x2="200" y2="270" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="210" y="255" font-size="11" fill="#2E7D32" font-style="italic">extends</text>

  <!-- Bottom: Dog -->
  <rect x="100" y="270" width="200" height="110" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5" />
  <text x="200" y="305" font-size="14" font-weight="bold" text-anchor="middle" fill="#BF360C">Dog (Leaf)</text>
  <text x="110" y="330" font-size="11" fill="#BF360C">• Inherited: breathe(), eat()</text>
  <text x="110" y="350" font-size="11" fill="#BF360C">• bark()</text>

  <!-- Title -->
  <text x="200" y="420" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Multi-level Inheritance</text>
  <text x="200" y="440" font-size="12" text-anchor="middle" fill="#666">(A chain of classes inheriting from each other)</text>
</svg>
