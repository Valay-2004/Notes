<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Parent -->
  <rect
    x="250"
    y="20"
    width="100"
    height="60"
    fill="#E8F5E9"
    stroke="#2E7D32"
    stroke-width="2"
    rx="5"
  />
  <text
    x="300"
    y="55"
    font-size="12"
    font-weight="bold"
    text-anchor="middle"
    fill="#1B5E20"
  >
    Animal
  </text>

  <!-- Lines down -->
  <line x1="300" y1="80" x2="150" y2="120" stroke="#2E7D32" stroke-width="2" />
  <line x1="300" y1="80" x2="300" y2="120" stroke="#2E7D32" stroke-width="2" />
  <line x1="300" y1="80" x2="450" y2="120" stroke="#2E7D32" stroke-width="2" />

  <!-- Child 1: Dog -->
  <rect
    x="100"
    y="120"
    width="100"
    height="60"
    fill="#FFF3E0"
    stroke="#E65100"
    stroke-width="2"
    rx="5"
  />
  <text
    x="150"
    y="155"
    font-size="12"
    font-weight="bold"
    text-anchor="middle"
    fill="#BF360C"
  >
    Dog
  </text>

  <!-- Child 2: Cat -->
  <rect
    x="250"
    y="120"
    width="100"
    height="60"
    fill="#FFF3E0"
    stroke="#E65100"
    stroke-width="2"
    rx="5"
  />
  <text
    x="300"
    y="155"
    font-size="12"
    font-weight="bold"
    text-anchor="middle"
    fill="#BF360C"
  >
    Cat
  </text>

  <!-- Child 3: Bird -->
  <rect
    x="400"
    y="120"
    width="100"
    height="60"
    fill="#FFF3E0"
    stroke="#E65100"
    stroke-width="2"
    rx="5"
  />
  <text
    x="450"
    y="155"
    font-size="12"
    font-weight="bold"
    text-anchor="middle"
    fill="#BF360C"
  >
    Bird
  </text>

  <!-- Title -->
  <text
    x="300"
    y="250"
    font-size="14"
    font-weight="bold"
    text-anchor="middle"
    fill="#333"
  >
    Hierarchical Inheritance
  </text>
  <text x="300" y="275" font-size="11" text-anchor="middle" fill="#666">
    (One parent → Multiple children)
  </text>
  <text x="300" y="295" font-size="11" text-anchor="middle" fill="#666">
    Each child inherits from Animal
  </text>
  <text x="300" y="315" font-size="11" text-anchor="middle" fill="#666">
    but has its own unique methods
  </text>
</svg>
