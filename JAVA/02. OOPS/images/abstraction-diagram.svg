<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Outside: User -->
  <circle cx="80" cy="175" r="40" fill="#E1F5FE" stroke="#01579B" stroke-width="2" />
  <text x="80" y="180" font-size="14" font-weight="bold" text-anchor="middle" fill="#01579B">User</text>
  
  <!-- Interface: Remote Control -->
  <rect x="200" y="50" width="120" height="250" fill="#455A64" stroke="#263238" stroke-width="3" rx="10" />
  <text x="260" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#263238">Simple Interface</text>
  <text x="260" y="25" font-size="12" text-anchor="middle" fill="#546E7A">(Remote Control)</text>
  
  <!-- Buttons on Remote -->
  <circle cx="260" cy="90" r="15" fill="#E91E63" />
  <text x="260" y="95" font-size="10" text-anchor="middle" fill="white">ON</text>
  
  <rect x="235" y="130" width="50" height="20" fill="#90A4AE" rx="3" />
  <text x="260" y="145" font-size="10" text-anchor="middle" fill="white">VOL +</text>
  
  <rect x="235" y="170" width="50" height="20" fill="#90A4AE" rx="3" />
  <text x="260" y="185" font-size="10" text-anchor="middle" fill="white">CH +</text>

  <!-- Arrow: Interaction -->
  <path d="M 125,175 L 190,175" stroke="#01579B" stroke-width="2" marker-end="url(#arrowhead-blue)" />
  <text x="160" y="165" font-size="11" text-anchor="middle" fill="#01579B">Interacts</text>

  <!-- Hidden Wall -->
  <line x1="360" y1="20" x2="360" y2="330" stroke="#B0BEC5" stroke-width="2" stroke-dasharray="8,5" />
  <text x="365" y="320" font-size="10" transform="rotate(-90 365,320)" fill="#78909C">Abstraction Wall (Hidden)</text>

  <!-- Implementation: Complex TV Internal -->
  <rect x="400" y="50" width="180" height="250" fill="#FBE9E7" stroke="#D84315" stroke-width="2" rx="5" />
  <text x="490" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#BF360C">Complex Implementation</text>
  <text x="490" y="25" font-size="12" text-anchor="middle" fill="#E64A19">(Internal Circuits)</text>
  
  <!-- Circuit lines -->
  <path d="M 420,100 L 480,100 L 480,150 L 520,150" stroke="#FFAB91" stroke-width="1" fill="none" />
  <path d="M 420,200 L 460,200 L 460,180 L 550,180" stroke="#FFAB91" stroke-width="1" fill="none" />
  <path d="M 500,80 L 500,240 L 560,240" stroke="#FFAB91" stroke-width="1" fill="none" />
  
  <!-- Arrow: Control -->
  <path d="M 325,175 L 390,175" stroke="#BF360C" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#arrowhead-red)" />

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#01579B" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#BF360C" />
    </marker>
  </defs>

  <text x="300" y="340" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Show "What" (Interface) • Hide "How" (Implementation)</text>
</svg>
